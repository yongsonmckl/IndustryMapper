name: ingest-sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run ingestion
        env:
          SUPABASE_URL: https://uwfpjwlkypryqhfmbybj.supabase.co
          SUPABASE_API_KEY: sb_publishable_V0f2QVxSxgU9ZGb5W5xBcg_bd0VSKEK
          SUPABASE_INGEST_TOKEN: ${{ secrets.SUPABASE_INGEST_TOKEN }}
        run: python ingestion/ingest_sources.py

      - name: Upload ingestion artifact
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-snapshot
          path: tmp/ingestion/latest_ingestion_snapshot.json
