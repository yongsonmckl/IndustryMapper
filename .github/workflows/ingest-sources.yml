name: ingest-sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_URL: https://uwfpjwlkypryqhfmbybj.supabase.co
      SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_INGEST_TOKEN: ${{ secrets.SUPABASE_INGEST_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate configuration
        run: |
          if [ -z "$SUPABASE_INGEST_TOKEN" ]; then
            echo "SUPABASE_INGEST_TOKEN is missing. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$SUPABASE_API_KEY" ] && [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_API_KEY or SUPABASE_SERVICE_ROLE_KEY is missing. Add one under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install dependencies
        run: python -m pip install -r ingestion/requirements.txt

      - name: Run ingestion
        run: python ingestion/ingest_sources.py

      - name: Run event enrichment
        run: python ingestion/enrich_events.py

      - name: Run retention cleanup
        env:
          ARTICLE_RETENTION_DAYS: "14"
        run: python ingestion/cleanup_supabase.py

      - name: Generate weekly summaries
        run: python ingestion/generate_weekly_summaries.py

      - name: Upload ingestion artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: ignore
          name: ingestion-snapshot
          path: |
            tmp/ingestion/latest_ingestion_snapshot.json
            tmp/enrichment/latest_enrichment_snapshot.json
            tmp/weekly/latest_weekly_summary_snapshot.json
